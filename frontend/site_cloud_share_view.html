<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared file view - Proconix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #eef2ff; color: #1f2945; }
    .wrap { max-width: 1100px; margin: 1rem auto; padding: 0 1rem; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; }
    .btn { border: 1px solid #dbe1f5; background: #fff; border-radius: 10px; padding: .45rem .7rem; text-decoration: none; color: #3b4567; font-weight: 600; }
    .card { background:#fff; border:1px solid #dbe1f5; border-radius: 14px; box-shadow: 0 16px 28px rgba(19,25,52,.12); overflow: hidden; }
    iframe { width: 100%; height: calc(100vh - 140px); border: 0; display: block; background: #f8faff; }
    .err { padding: 1rem; color: #9a2f2f; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h3>Shared file</h3>
      <a id="downloadBtn" class="btn" href="#"><i class="bi bi-download"></i> Download</a>
    </div>
    <div class="card">
      <iframe id="viewFrame" title="Shared file preview"></iframe>
      <div id="err" class="err" style="display:none;">Preview is unavailable for this file type. Use Download.</div>
    </div>
  </div>
  <script>
    (function () {
      var token = new URLSearchParams(window.location.search).get('token') || '';
      var frame = document.getElementById('viewFrame');
      var err = document.getElementById('err');
      var downloadBtn = document.getElementById('downloadBtn');
      if (!token) {
        if (frame) frame.style.display = 'none';
        if (err) { err.style.display = 'block'; err.textContent = 'Invalid or missing token.'; }
        return;
      }
      var viewUrl = '/api/site-cloud/share/' + encodeURIComponent(token) + '/view';
      var downloadUrl = '/api/site-cloud/share/' + encodeURIComponent(token);
      if (downloadBtn) downloadBtn.href = downloadUrl;
      if (frame) {
        frame.src = viewUrl;
        frame.addEventListener('error', function () {
          frame.style.display = 'none';
          if (err) err.style.display = 'block';
        });
      }
    })();
  </script>
</body>
</html>
