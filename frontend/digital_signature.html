<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon_io/favicon.ico" sizes="any">
  <title>Documents &amp; Digital Signatures – Proconix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/digital_signature.css" rel="stylesheet">
</head>
<body class="ds-module">
  <div class="ds-wrap">
    <div class="ds-topbar">
      <h1><i class="bi bi-journal-text" aria-hidden="true"></i> Documents &amp; Signatures</h1>
      <button type="button" class="ds-btn-primary" id="dsBtnNewDoc" disabled title="Upload a PDF">
        <i class="bi bi-cloud-upload" aria-hidden="true"></i> Upload document
      </button>
    </div>

    <section class="ds-stats" id="dsStats" aria-live="polite"></section>

    <div class="ds-tabs" id="dsTabs" role="tablist" aria-label="Document status tabs">
      <button type="button" class="ds-tab is-active" data-status="">All</button>
      <button type="button" class="ds-tab" data-status="draft">Draft</button>
      <button type="button" class="ds-tab" data-status="pending_signatures">In progress</button>
      <button type="button" class="ds-tab" data-status="completed">Signed</button>
      <button type="button" class="ds-tab" data-status="expired">Expired</button>
      <button type="button" class="ds-tab" data-status="cancelled">Cancelled</button>
    </div>

    <div class="ds-filters">
      <div class="ds-filter-item">
        <label for="dsFilterProject"><i class="bi bi-building"></i> Project</label>
        <select id="dsFilterProject" class="ds-select" aria-label="Filter by project">
          <option value="">All projects</option>
        </select>
      </div>
      <div class="ds-filter-item">
        <label for="dsFilterStatus"><i class="bi bi-funnel"></i> Status</label>
        <select id="dsFilterStatus" class="ds-select" aria-label="Filter by status">
          <option value="">All</option>
          <option value="draft">Draft</option>
          <option value="pending_signatures">Pending signatures</option>
          <option value="completed">Completed</option>
        </select>
      </div>
      <div class="ds-filter-item ds-filter-item--search">
        <label for="dsSearch"><i class="bi bi-search"></i> Search</label>
        <input type="search" id="dsSearch" class="ds-input" placeholder="Search documents..." autocomplete="off" disabled>
      </div>
    </div>

    <section class="ds-table-wrap">
      <div class="ds-table-head">
        <span>Document</span>
        <span>Created</span>
        <span>Progress</span>
        <span>Status</span>
        <span>Actions</span>
      </div>
      <div id="dsListMount" class="ds-table-body" aria-live="polite"></div>
    </section>

    <div id="dsEmpty" class="ds-empty">
      <i class="bi bi-journal-text" aria-hidden="true"></i>
      <p class="mb-1"><strong>No documents yet</strong></p>
      <p class="mb-0 small">Upload your first PDF and use <strong>Build &amp; Assign</strong> to place signature fields and assign recipients.</p>
    </div>
  </div>

  <div id="dsModalBackdrop" class="ds-modal-backdrop d-none" aria-hidden="true"></div>
  <div id="dsModalNew" class="ds-modal d-none" role="dialog" aria-labelledby="dsModalTitle" aria-modal="true">
    <div class="ds-modal-card">
      <div class="ds-modal-head">
        <h2 id="dsModalTitle" class="ds-modal-title">New document</h2>
        <button type="button" class="ds-modal-close" id="dsModalClose" aria-label="Close">&times;</button>
      </div>
      <form id="dsFormUpload" class="ds-modal-body">
        <p id="dsFormError" class="ds-form-error d-none" role="alert"></p>
        <div class="ds-field">
          <label for="dsUpTitle">Title <span class="ds-req">*</span></label>
          <input type="text" id="dsUpTitle" name="title" class="ds-input ds-input-block" required maxlength="500" placeholder="e.g. Site induction pack">
        </div>
        <div class="ds-field">
          <label for="dsUpFile">PDF file <span class="ds-req">*</span></label>
          <input type="file" id="dsUpFile" name="file" class="ds-file" accept=".pdf,application/pdf" required>
        </div>
        <div class="ds-field">
          <label for="dsUpProject">Project (optional)</label>
          <select id="dsUpProject" name="project_id" class="ds-select ds-input-block">
            <option value="">— No project —</option>
          </select>
        </div>
        <div class="ds-field">
          <label for="dsUpType">Document type</label>
          <select id="dsUpType" name="document_type" class="ds-select ds-input-block">
            <option value="">— Select —</option>
            <option value="RAMS">RAMS</option>
            <option value="Toolbox Talk">Toolbox Talk</option>
            <option value="Method Statement">Method Statement</option>
            <option value="Induction">Induction</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="ds-field">
          <label for="dsUpRecipientGroup">Recipient group</label>
          <select id="dsUpRecipientGroup" name="recipient_group" class="ds-select ds-input-block">
            <option value="operatives">Operatives</option>
            <option value="client">Client</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="ds-field">
          <label for="dsUpDesc">Description</label>
          <textarea id="dsUpDesc" name="description" class="ds-textarea" rows="2" maxlength="2000" placeholder="Optional notes"></textarea>
        </div>
        <div class="ds-modal-actions">
          <button type="button" class="ds-btn-secondary" id="dsModalCancel">Cancel</button>
          <button type="submit" class="ds-btn-primary" id="dsModalSubmit">
            <i class="bi bi-upload" aria-hidden="true"></i> Upload
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/digital_signature.js"></script>
</body>
</html>
