<!DOCTYPE html>
<html lang="en" class="supervisor-dashboard-ios-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/favicon_io/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png">
  <link rel="manifest" href="/favicon_io/site.webmanifest">
  <title>Supervisor Dashboard – Proconix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/dashboard_manager.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="css/supervisor_dashboard.css" rel="stylesheet">
</head>
<body class="dashboard-manager supervisor-dashboard-ios">
  <div id="dashboard-loading" class="dashboard-loading">
    <div class="dashboard-loading-spinner"></div>
    <p>Verifying access…</p>
  </div>

  <div id="dashboard-access-denied" class="dashboard-access-denied d-none">
    <div class="dashboard-access-denied-card">
      <i class="bi bi-person-badge dashboard-access-denied-icon"></i>
      <h2>Access denied</h2>
      <p class="dashboard-access-denied-message">
        This area is for <strong>Supervisor</strong> accounts only. Please sign in with a supervisor login, or use the operative dashboard if you are an operative.
      </p>
      <a href="/index.html" class="btn btn-primary mt-3">Back to Home</a>
    </div>
  </div>

  <div id="dashboard-app" class="d-none">
    <div class="main-wrap">
      <header class="dashboard-header">
        <h1 class="header-title" id="header-title">Material Management</h1>
        <div class="dashboard-header-right">
          <div class="dashboard-my-company">
            <span class="dashboard-my-company-label">Signed in</span>
            <span class="dashboard-my-company-name" id="dashboard-company-name">—</span>
            <span class="dashboard-my-company-user" id="dashboard-user-name">—</span>
          </div>
          <button type="button" class="btn-dashboard-logout" id="dashboard-logout-btn" aria-label="Logout">
            <i class="bi bi-box-arrow-right"></i> Logout
          </button>
        </div>
      </header>

      <div class="dashboard-content-wrap">
        <main id="dashboard-content" class="dashboard-main dashboard-content">
          <p class="text-muted" style="padding: 24px;">Loading…</p>
        </main>
      </div>
    </div>

    <nav id="sv-tab-bar" class="sv-tab-bar" aria-label="Supervisor navigation">
      <a href="#" class="sv-tab active" data-module="manage-material" aria-current="page">
        <i class="bi bi-box-seam-fill" aria-hidden="true"></i>
        <span>Materials</span>
      </a>
      <a href="#" class="sv-tab" data-module="task-planning">
        <i class="bi bi-calendar3" aria-hidden="true"></i>
        <span>Planning</span>
      </a>
      <a href="#" class="sv-tab" data-module="site-snags">
        <i class="bi bi-pin-map-fill" aria-hidden="true"></i>
        <span>Snags</span>
      </a>
      <a href="#" class="sv-tab" data-module="quality-assurance">
        <i class="bi bi-clipboard-check-fill" aria-hidden="true"></i>
        <span>QA</span>
      </a>
      <a href="/index.html" class="sv-tab sv-tab--home">
        <i class="bi bi-house-fill" aria-hidden="true"></i>
        <span>Home</span>
      </a>
    </nav>
  </div>

  <script src="js/supervisor_dashboard.js"></script>
</body>
</html>
