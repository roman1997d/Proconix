<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon_io/favicon.ico" sizes="any">
  <title>View signatures – Proconix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/digital_signature_view.css" rel="stylesheet">
</head>
<body class="dsv-module">
  <header class="dsv-top">
    <div>
      <a class="dsv-back" href="digital_signature.html"><i class="bi bi-arrow-left"></i> Documents</a>
      <h1 id="dsvTitle"><i class="bi bi-file-earmark-check"></i> View signatures</h1>
    </div>
    <div class="dsv-actions">
      <button type="button" class="dsv-btn dsv-btn-primary" id="dsvBtnDownload" title="PDF with signatures merged onto pages">
        <i class="bi bi-download"></i> Download signed PDF
      </button>
      <button type="button" class="dsv-btn dsv-btn-secondary" id="dsvBtnEmail" title="Send merged PDF to your manager email (SMTP required)">
        <i class="bi bi-envelope"></i> Send to my email
      </button>
    </div>
    <span class="dsv-muted" id="dsvStatus"></span>
  </header>

  <p id="dsvError" class="dsv-error d-none" role="alert"></p>

  <div class="dsv-layout" id="dsvLayout">
    <div class="dsv-pages">
      <div class="dsv-pages-inner" id="dsvPages"></div>
    </div>
    <aside class="dsv-side">
      <h2>Signature log</h2>
      <p class="dsv-muted" id="dsvSideHint">Each field response is listed with user and time.</p>
      <ul class="dsv-audit" id="dsvAuditList"></ul>
    </aside>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="js/digital_signature_view.js"></script>
</body>
</html>
