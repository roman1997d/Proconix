<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon_io/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png">
  <link rel="manifest" href="/favicon_io/site.webmanifest">
  <title>Profile Settings – Proconix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <style>
    :root {
      --bg-main: #0b1620;
      --bg-card: #111827;
      --bg-card-alt: #0f172a;
      --text-primary: #e5e7eb;
      --text-secondary: #9ca3af;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.15);
      --danger: #f97373;
      --success: #4ade80;
      --warning: #facc15;
      --radius: 14px;
      --gap: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 22px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(1000px 400px at 10% 0%, rgba(59, 130, 246, 0.18), transparent),
                  linear-gradient(135deg, var(--bg-main) 0%, #020617 100%);
      color: var(--text-primary);
    }

    .ps-wrap {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .ps-card {
      background: linear-gradient(180deg, var(--bg-card), var(--bg-card-alt));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .ps-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 700;
    }

    .ps-title i { color: var(--accent); font-size: 20px; }

    .ps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .ps-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ps-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .ps-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 11px 12px;
      border-radius: 10px;
      outline: none;
    }

    .ps-input::placeholder { color: rgba(229,231,235,0.55); }
    .ps-input:disabled { opacity: 0.65; cursor: not-allowed; }

    .ps-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      align-items: center;
    }

    .ps-btn {
      border: 1px solid var(--border);
      background: rgba(59,130,246,0.12);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .ps-btn:hover { background: rgba(59,130,246,0.18); }
    .ps-btn:disabled { opacity: 0.65; cursor: not-allowed; }

    .ps-btn-danger {
      background: rgba(249,115,115,0.12);
    }
    .ps-btn-danger:hover { background: rgba(249,115,115,0.18); }

    .ps-msg {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
    }
    .ps-msg.success { border-color: rgba(74,222,128,0.35); }
    .ps-msg.error { border-color: rgba(249,115,115,0.35); }
    .ps-msg.d-none { display: none; }

    @media (max-width: 820px) {
      .ps-grid { grid-template-columns: 1fr; }
    }
  </style>

  <div class="ps-wrap">
    <div class="ps-card">
      <div class="ps-title">
        <i class="bi bi-person-gear"></i>
        <span>Profile Settings</span>
      </div>

      <div id="ps-loading" class="ps-msg" style="display:block;">Loading profile…</div>
      <div id="ps-error" class="ps-msg error" role="alert"></div>
      <div id="ps-success" class="ps-msg success" role="status"></div>

      <div class="ps-grid" aria-label="Manager profile details">
        <div class="ps-field">
          <div class="ps-label">Full name</div>
          <div id="ps-fullname" class="ps-input" style="display:flex;align-items:center;"></div>
        </div>
        <div class="ps-field">
          <div class="ps-label">Company</div>
          <div id="ps-company" class="ps-input" style="display:flex;align-items:center;"></div>
        </div>
        <div class="ps-field">
          <div class="ps-label">Email</div>
          <div id="ps-email" class="ps-input" style="display:flex;align-items:center;"></div>
        </div>
        <div class="ps-field">
          <div class="ps-label">Phone (if available in DB)</div>
          <input type="tel" class="ps-input" id="ps-phone" placeholder="e.g. +44 7700 900000" />
          <div id="ps-phone-note" class="ps-label" style="margin-top:-2px; color: var(--text-muted); font-size: 12px;"></div>
        </div>
      </div>

      <div class="ps-actions">
        <button type="button" class="ps-btn" id="ps-btn-save-phone">
          <i class="bi bi-save2"></i> Save phone
        </button>
      </div>
    </div>

    <div class="ps-card">
      <div class="ps-title">
        <i class="bi bi-key"></i>
        <span>Change password</span>
      </div>

      <div class="ps-grid">
        <div class="ps-field">
          <div class="ps-label">Current password</div>
          <input type="password" class="ps-input" id="ps-current-password" placeholder="Enter current password" autocomplete="current-password" />
        </div>
        <div class="ps-field">
          <div class="ps-label">New password</div>
          <input type="password" class="ps-input" id="ps-new-password" placeholder="Enter new password" autocomplete="new-password" />
        </div>
        <div class="ps-field">
          <div class="ps-label">Confirm new password</div>
          <input type="password" class="ps-input" id="ps-confirm-new-password" placeholder="Confirm new password" autocomplete="new-password" />
        </div>
        <div class="ps-field">
          <div class="ps-label">Password policy</div>
          <div class="ps-input" style="display:flex;align-items:center; color: var(--text-secondary);">
            Minimum 8 characters.
          </div>
        </div>
      </div>

      <div class="ps-actions">
        <button type="button" class="ps-btn ps-btn-danger" id="ps-btn-change-password">
          <i class="bi bi-shield-lock-fill"></i> Update password
        </button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      var SESSION_KEY = 'proconix_manager_session';
      var phoneSupported = false;

      var elLoading = document.getElementById('ps-loading');
      var elError = document.getElementById('ps-error');
      var elSuccess = document.getElementById('ps-success');

      var elFullname = document.getElementById('ps-fullname');
      var elCompany = document.getElementById('ps-company');
      var elEmail = document.getElementById('ps-email');
      var elPhone = document.getElementById('ps-phone');
      var elPhoneNote = document.getElementById('ps-phone-note');

      var elBtnSavePhone = document.getElementById('ps-btn-save-phone');
      var elBtnChangePassword = document.getElementById('ps-btn-change-password');

      var elCurrentPassword = document.getElementById('ps-current-password');
      var elNewPassword = document.getElementById('ps-new-password');
      var elConfirmNewPassword = document.getElementById('ps-confirm-new-password');

      function getSession() {
        try {
          var raw = localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (_) {
          return null;
        }
      }

      function getSessionHeaders() {
        var session = getSession();
        if (!session || session.manager_id == null || !session.email) return null;
        return {
          'X-Manager-Id': String(session.manager_id),
          'X-Manager-Email': session.email
        };
      }

      function showMessage(boxEl, text) {
        if (!boxEl) return;
        boxEl.textContent = text || '';
        boxEl.style.display = text ? 'block' : 'none';
      }

      function showError(text) {
        showMessage(elError, text);
        showMessage(elSuccess, '');
      }

      function showSuccess(text) {
        showMessage(elSuccess, text);
        showMessage(elError, '');
      }

      function setLoading(isLoading) {
        if (!elLoading) return;
        elLoading.style.display = isLoading ? 'block' : 'none';
      }

      function setPlaceholders(placeholder) {
        var value = placeholder || '—';
        if (elFullname) elFullname.textContent = value;
        if (elCompany) elCompany.textContent = value;
        if (elEmail) elEmail.textContent = value;
      }

      function loadProfile() {
        var headers = getSessionHeaders();
        if (!headers) {
          setLoading(false);
          showError('Session expired. Please sign in again.');
          return Promise.reject(new Error('No session headers'));
        }

        setLoading(true);
        setPlaceholders('—');
        phoneSupported = false;
        if (elPhone) elPhone.disabled = true;

        return Promise.all([
          fetch('/api/auth/validate', { headers: headers }).then(function (res) {
            return res.json().catch(function () { return null; }).then(function (data) {
              if (!res.ok) {
                throw new Error((data && data.message) ? data.message : 'Failed to validate session.');
              }
              return data;
            });
          }),
          fetch('/api/managers/me', { headers: headers }).then(function (res) {
            return res.json().catch(function () { return null; }).then(function (data) {
              if (!res.ok) {
                throw new Error((data && data.message) ? data.message : 'Failed to load manager profile.');
              }
              return data;
            });
          })
        ]).then(function (results) {
          var validate = results[0];
          var me = results[1];

          var manager = (me && me.manager) ? me.manager : {};
          phoneSupported = !!(me && me.phone_supported);

          var fullName = [manager.name, manager.surname].filter(Boolean).join(' ') || '—';
          elFullname.textContent = fullName;
          elCompany.textContent = (validate && validate.company_name) ? validate.company_name : '—';
          elEmail.textContent = manager.email || '—';

          if (phoneSupported) {
            elPhone.disabled = false;
            elPhone.value = manager.phone != null ? String(manager.phone) : '';
            elPhoneNote.textContent = '';
            elBtnSavePhone.disabled = false;
          } else {
            elPhone.disabled = true;
            elPhone.value = '';
            elPhoneNote.textContent = 'Phone is not supported in the current database schema.';
            elBtnSavePhone.disabled = true;
          }

          setLoading(false);
          return true;
        }).catch(function (err) {
          setLoading(false);
          showError((err && err.message) ? err.message : 'Failed to load profile.');
          return false;
        });
      }

      function savePhone() {
        var headers = getSessionHeaders();
        if (!headers) return;
        if (!phoneSupported) {
          showError('Phone update is not supported.');
          return;
        }

        var phone = (elPhone && typeof elPhone.value === 'string') ? elPhone.value.trim() : '';

        fetch('/api/managers/phone', {
          method: 'PATCH',
          headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }),
          body: JSON.stringify({ phone: phone })
        })
          .then(function (res) {
            return res.json().then(function (data) {
              if (!res.ok) throw new Error(data && data.message ? data.message : 'Failed to update phone.');
              return data;
            });
          })
          .then(function () {
            showSuccess('Phone updated successfully.');
          })
          .catch(function (err) {
            showError((err && err.message) ? err.message : 'Failed to update phone.');
          });
      }

      function changePassword() {
        var headers = getSessionHeaders();
        if (!headers) return;

        var currentPassword = elCurrentPassword ? elCurrentPassword.value : '';
        var newPassword = elNewPassword ? elNewPassword.value : '';
        var confirmNewPassword = elConfirmNewPassword ? elConfirmNewPassword.value : '';

        if (!currentPassword) {
          showError('Current password is required.');
          return;
        }
        if (!newPassword || newPassword.length < 8) {
          showError('New password must be at least 8 characters.');
          return;
        }
        if (newPassword !== confirmNewPassword) {
          showError('New password and confirmation do not match.');
          return;
        }

        fetch('/api/managers/change-password', {
          method: 'POST',
          headers: Object.assign({}, headers, { 'Content-Type': 'application/json' }),
          body: JSON.stringify({
            current_password: currentPassword,
            new_password: newPassword
          })
        })
          .then(function (res) {
            return res.json().then(function (data) {
              if (!res.ok) throw new Error(data && data.message ? data.message : 'Failed to update password.');
              return data;
            });
          })
          .then(function () {
            showSuccess('Password updated successfully.');
            if (elCurrentPassword) elCurrentPassword.value = '';
            if (elNewPassword) elNewPassword.value = '';
            if (elConfirmNewPassword) elConfirmNewPassword.value = '';
          })
          .catch(function (err) {
            showError((err && err.message) ? err.message : 'Failed to update password.');
          });
      }

      // Default state
      if (elBtnSavePhone) elBtnSavePhone.disabled = true;

      if (elBtnSavePhone) elBtnSavePhone.addEventListener('click', function () {
        savePhone();
      });

      if (elBtnChangePassword) elBtnChangePassword.addEventListener('click', function () {
        changePassword();
      });

      loadProfile();
    })();
  </script>
</body>
</html>
