<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Public Drawing View</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #0b1018; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .toolbar { position: fixed; top: 0; left: 0; right: 0; height: 62px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; z-index: 5; background: linear-gradient(180deg, rgba(12,18,28,.96), rgba(12,18,28,.8)); }
    .tool { min-height: 40px; border: 1px solid rgba(255,255,255,.2); border-radius: 999px; background: rgba(255,255,255,.08); color: #f8fafc; font-size: .82rem; padding: 0 12px; display: inline-flex; align-items: center; gap: 6px; }
    .stage { position: fixed; inset: 62px 0 0 0; overflow: hidden; background: #0b1018; }
    .frame, .img, .dwg { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; }
    .img { object-fit: contain; cursor: grab; touch-action: none; }
    .dwg { color: #facc15; padding: 18px; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="tool" id="tool-calibrate"><i class="bi bi-rulers"></i> Calibrate</button>
    <button class="tool" id="tool-share"><i class="bi bi-share"></i> Share</button>
    <button class="tool" id="tool-download"><i class="bi bi-download"></i> Download</button>
  </div>
  <div class="stage" id="stage">
    <iframe id="frame" class="frame" title="Drawing PDF"></iframe>
    <img id="img" class="img" alt="Drawing">
    <div id="dwg" class="dwg">This file cannot be previewed in browser. Use Download.</div>
  </div>

  <script>
  (function () {
    'use strict';
    var params = new URLSearchParams(window.location.search || '');
    var token = params.get('t') || '';
    var frame = document.getElementById('frame');
    var img = document.getElementById('img');
    var dwg = document.getElementById('dwg');
    var stage = document.getElementById('stage');
    var blobUrl = null;
    var state = { scale: 1, tx: 0, ty: 0 };

    function resetTransform() {
      state.scale = 1;
      state.tx = 0;
      state.ty = 0;
      if (img) img.style.transform = 'translate(0px,0px) scale(1)';
    }

    function applyTransform() {
      if (!img || img.style.display === 'none') return;
      img.style.transform = 'translate(' + state.tx + 'px,' + state.ty + 'px) scale(' + state.scale + ')';
    }

    function load() {
      if (!token) return;
      fetch('/api/drawing-gallery/public/' + encodeURIComponent(token) + '/meta')
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
        .then(function (out) {
          if (!out.ok || !out.data.success || !out.data.version) throw new Error('Invalid link');
          var v = out.data.version;
          document.title = (v.title || 'Drawing') + ' - Public View';
          var isPdf = (v.mime_type || '').toLowerCase().indexOf('pdf') >= 0;
          var isImg = (v.mime_type || '').toLowerCase().indexOf('image/') === 0;
          return fetch('/api/drawing-gallery/public/' + encodeURIComponent(token) + '/file')
            .then(function (res) { if (!res.ok) throw new Error('File load failed'); return res.blob(); })
            .then(function (blob) {
              blobUrl = URL.createObjectURL(blob);
              if (isPdf || blob.type.indexOf('pdf') >= 0) {
                frame.style.display = 'block';
                frame.src = blobUrl;
              } else if (isImg || blob.type.indexOf('image/') === 0) {
                img.style.display = 'block';
                img.src = blobUrl;
                resetTransform();
              } else {
                dwg.style.display = 'block';
              }
            });
        })
        .catch(function () {
          dwg.style.display = 'block';
          dwg.textContent = 'Invalid or expired public link.';
        });
    }

    document.getElementById('tool-calibrate').addEventListener('click', function () {
      resetTransform();
    });
    document.getElementById('tool-share').addEventListener('click', function () {
      var url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: document.title || 'Drawing', url: url }).catch(function () {});
      } else if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).catch(function () {});
      }
    });
    document.getElementById('tool-download').addEventListener('click', function () {
      window.location.href = '/api/drawing-gallery/public/' + encodeURIComponent(token) + '/file?download=1';
    });

    var drag = null, pinchStartDist = 0, pinchStartScale = 1, panTouch = null;
    function touchDist(a, b) { var dx = a.clientX - b.clientX; var dy = a.clientY - b.clientY; return Math.sqrt(dx * dx + dy * dy); }
    stage.addEventListener('wheel', function (e) {
      if (img.style.display === 'none') return;
      e.preventDefault();
      var z = e.deltaY < 0 ? 1.08 : 0.92;
      state.scale = Math.max(0.25, Math.min(5, state.scale * z));
      applyTransform();
    }, { passive: false });
    stage.addEventListener('mousedown', function (e) {
      if (img.style.display === 'none' || e.button !== 0) return;
      drag = { x: e.clientX, y: e.clientY, tx: state.tx, ty: state.ty };
    });
    document.addEventListener('mousemove', function (e) {
      if (!drag) return;
      state.tx = drag.tx + (e.clientX - drag.x);
      state.ty = drag.ty + (e.clientY - drag.y);
      applyTransform();
    });
    document.addEventListener('mouseup', function () { drag = null; });
    stage.addEventListener('touchstart', function (e) {
      if (img.style.display === 'none') return;
      if (e.touches.length === 2) { pinchStartDist = touchDist(e.touches[0], e.touches[1]); pinchStartScale = state.scale; panTouch = null; }
      else if (e.touches.length === 1) { panTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx: state.tx, ty: state.ty }; }
    }, { passive: false });
    stage.addEventListener('touchmove', function (e) {
      if (img.style.display === 'none') return;
      e.preventDefault();
      if (e.touches.length === 2 && pinchStartDist > 0) {
        var d = touchDist(e.touches[0], e.touches[1]);
        state.scale = Math.max(0.25, Math.min(5, pinchStartScale * (d / pinchStartDist)));
        applyTransform();
      } else if (e.touches.length === 1 && panTouch) {
        state.tx = panTouch.tx + (e.touches[0].clientX - panTouch.x);
        state.ty = panTouch.ty + (e.touches[0].clientY - panTouch.y);
        applyTransform();
      }
    }, { passive: false });

    window.addEventListener('beforeunload', function () {
      if (blobUrl) { try { URL.revokeObjectURL(blobUrl); } catch (_) {} }
    });
    load();
  })();
  </script>
</body>
</html>
