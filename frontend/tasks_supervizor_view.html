<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tasks – Supervisor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f2f7;
      --card: #fff;
      --text: #000;
      --muted: rgba(60,60,67,.6);
      --blue: #007aff;
      --sep: rgba(60,60,67,.29);
      --radius: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --card: #1c1c1e;
        --text: #fff;
        --muted: rgba(235,235,245,.6);
        --sep: rgba(84,84,88,.65);
      }
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    body {
      margin: 0;
      min-height: 100%;
      min-height: -webkit-fill-available;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .tsv-wrap {
      min-height: 100%;
      min-height: -webkit-fill-available;
      padding: 12px 12px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }
    .tsv-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tsv-toolbar h1 { font-size: 1.25rem; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
    .tsv-nav-month { display: flex; align-items: center; gap: 8px; }
    .tsv-btn {
      border: none; background: var(--card); color: var(--blue); font-weight: 600; font-size: 1rem;
      padding: 10px 14px; border-radius: 10px; cursor: pointer; border: 0.5px solid var(--sep);
    }
    .tsv-btn:active { opacity: 0.6; }
    .tsv-cal { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--sep); overflow: hidden; }
    .tsv-cal-head { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--muted); padding: 8px 4px; border-bottom: 0.5px solid var(--sep); }
    .tsv-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); min-height: 280px; }
    .tsv-day {
      min-height: 52px; border: 0.5px solid var(--sep); padding: 4px; font-size: 0.75rem; vertical-align: top;
      cursor: pointer; position: relative;
    }
    .tsv-day.other { opacity: 0.35; }
    .tsv-day-num { font-weight: 600; margin-bottom: 2px; }
    .tsv-day-dots { display: flex; flex-wrap: wrap; gap: 2px; }
    .tsv-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--blue);
    }
    .tsv-dot.prio-high { background: #ff9500; }
    .tsv-dot.prio-critical { background: #ff3b30; }
    .tsv-dot.st-done { background: #34c759; }
    .tsv-dot.st-declined { background: #8e8e93; }
    .tsv-list { margin-top: 12px; }
    .tsv-card {
      background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--sep); padding: 12px; margin-bottom: 8px;
      cursor: pointer;
    }
    .tsv-card-title { font-weight: 600; margin-bottom: 4px; }
    .tsv-card-meta { font-size: 0.8rem; color: var(--muted); }
    .tsv-modal-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; align-items: flex-end; justify-content: center;
    }
    .tsv-modal-backdrop.open { display: flex; }
    .tsv-modal {
      background: var(--card); width: 100%; max-width: 520px; max-height: 90vh; overflow: auto; border-radius: var(--radius) var(--radius) 0 0;
      padding: 16px; padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    .tsv-modal h2 { font-size: 1.1rem; margin: 0 0 8px; }
    .tsv-modal dl { margin: 0; font-size: 0.9rem; }
    .tsv-modal dt { color: var(--muted); font-size: 0.75rem; margin-top: 8px; }
    .tsv-modal dd { margin: 0; }
    .tsv-actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .tsv-actions button {
      flex: 1 1 40%; min-height: 44px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 0.9rem;
    }
    .tsv-ac-complete { background: #34c759; color: #fff; }
    .tsv-ac-ongoing { background: #007aff; color: #fff; }
    .tsv-ac-reject { background: #ff3b30; color: #fff; }
    .tsv-ac-paused { background: #ff9500; color: #fff; }
    .tsv-select { width: 100%; padding: 10px; border-radius: 10px; border: 0.5px solid var(--sep); background: var(--bg); color: var(--text); font-size: 1rem; margin-top: 4px; }
    .tsv-photo-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
    .tsv-photo-row img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; }
    .tsv-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.85); color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 0.9rem; z-index: 2000; display: none; }
    .tsv-toast.show { display: block; }
    .tsv-empty { text-align: center; color: var(--muted); padding: 24px; }
  </style>
</head>
<body>
  <div class="tsv-wrap">
    <div class="tsv-toolbar">
      <h1>Project tasks</h1>
      <div class="tsv-nav-month">
        <button type="button" class="tsv-btn" id="tsvPrev" aria-label="Previous month"><i class="bi bi-chevron-left"></i></button>
        <span id="tsvMonthLabel" style="font-weight:600;min-width:9rem;text-align:center;"></span>
        <button type="button" class="tsv-btn" id="tsvNext" aria-label="Next month"><i class="bi bi-chevron-right"></i></button>
      </div>
    </div>
    <div class="tsv-cal" id="tsvCal">
      <div class="tsv-cal-head"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div>
      <div class="tsv-cal-grid" id="tsvGrid"></div>
    </div>
    <div class="tsv-list" id="tsvList"></div>
  </div>

  <div class="tsv-modal-backdrop" id="tsvModalBg" role="dialog" aria-modal="true" aria-labelledby="tsvModalTitle">
    <div class="tsv-modal" id="tsvModal">
      <h2 id="tsvModalTitle">Task</h2>
      <dl>
        <dt>Assigned</dt><dd id="tsvDdAssign">—</dd>
        <dt>Status</dt><dd id="tsvDdStatus">—</dd>
        <dt>Priority</dt><dd id="tsvDdPrio">—</dd>
        <dt>Deadline</dt><dd id="tsvDdDeadline">—</dd>
        <dt>Description</dt><dd id="tsvDdDesc">—</dd>
        <dt>Reassign to</dt><dd>
          <select id="tsvReassign" class="tsv-select"></select>
          <button type="button" class="tsv-btn" id="tsvBtnReassign" style="width:100%;margin-top:8px;">Apply reassignment</button>
        </dd>
        <dt>Photos</dt><dd>
          <div class="tsv-photo-row" id="tsvPhotos"></div>
          <input type="file" id="tsvPhotoInput" accept="image/*" capture="environment" style="display:none">
          <button type="button" class="tsv-btn" id="tsvBtnPhoto" style="width:100%;"><i class="bi bi-camera"></i> Add photo</button>
        </dd>
      </dl>
      <div class="tsv-actions">
        <button type="button" class="tsv-ac-complete" data-status="completed">Complete</button>
        <button type="button" class="tsv-ac-ongoing" data-status="in_progress">Ongoing</button>
        <button type="button" class="tsv-ac-paused" data-status="paused">Paused</button>
        <button type="button" class="tsv-ac-reject" data-status="declined">Rejected</button>
      </div>
      <button type="button" class="tsv-btn" id="tsvModalClose" style="width:100%;margin-top:8px;">Close</button>
    </div>
  </div>
  <div class="tsv-toast" id="tsvToast"></div>

  <script>
(function () {
  'use strict';
  var TOKEN_KEY = 'proconix_operative_token';
  var API = '/api/planning/supervisor';
  var tasks = [];
  var operatives = [];
  var viewDate = new Date();
  var selectedTaskId = null;

  function headers() {
    var t = localStorage.getItem(TOKEN_KEY) || sessionStorage.getItem(TOKEN_KEY);
    var h = { 'Content-Type': 'application/json' };
    if (t) h['X-Operative-Token'] = t;
    return h;
  }

  function fetchJson(url, opts) {
    opts = opts || {};
    opts.headers = Object.assign({}, headers(), opts.headers || {});
    return fetch(url, opts).then(function (r) {
      return r.json().then(function (j) { return { ok: r.ok, status: r.status, json: j }; });
    });
  }

  function showToast(msg) {
    var el = document.getElementById('tsvToast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function () { el.classList.remove('show'); }, 2500);
  }

  function taskDate(t) {
    var d = t.deadline || t.pickup_start_date;
    if (!d) return null;
    var s = String(d).slice(0, 10);
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    try {
      return new Date(d).toISOString().slice(0, 10);
    } catch (e) { return null; }
  }

  function loadAll() {
    return fetchJson(API + '/list', { method: 'GET' }).then(function (out) {
      if (!out.ok || !out.json.success) throw new Error((out.json && out.json.message) || 'Load failed');
      tasks = [];
      (out.json.plans || []).forEach(function (p) {
        (p.tasks || []).forEach(function (t) {
          tasks.push(Object.assign({}, t, { planId: p.id }));
        });
      });
      return fetchJson('/api/planning/supervisor/project-operatives', { method: 'GET' });
    }).then(function (out) {
      if (out.ok && out.json.success) operatives = out.json.operatives || [];
      render();
    }).catch(function (e) {
      showToast(e.message || 'Error');
      document.getElementById('tsvList').innerHTML = '<div class="tsv-empty">Could not load tasks.</div>';
    });
  }

  function ymd(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function parseYmd(s) {
    var p = s.split('-');
    return new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
  }

  function tasksForDay(dayYmd) {
    return tasks.filter(function (t) { return taskDate(t) === dayYmd; });
  }

  function renderCalendar() {
    var y = viewDate.getFullYear();
    var m = viewDate.getMonth();
    document.getElementById('tsvMonthLabel').textContent =
      viewDate.toLocaleString(undefined, { month: 'long', year: 'numeric' });

    var first = new Date(y, m, 1);
    var startDow = (first.getDay() + 6) % 7;
    var gridStart = new Date(y, m, 1 - startDow);
    var grid = document.getElementById('tsvGrid');
    grid.innerHTML = '';
    for (var i = 0; i < 42; i++) {
      var cell = document.createElement('div');
      var d = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i);
      var dayYmd = ymd(d);
      var inMonth = d.getMonth() === m;
      cell.className = 'tsv-day' + (inMonth ? '' : ' other');
      cell.setAttribute('data-day', dayYmd);
      var num = document.createElement('div');
      num.className = 'tsv-day-num';
      num.textContent = d.getDate();
      cell.appendChild(num);
      var dayTasks = tasksForDay(dayYmd);
      var dots = document.createElement('div');
      dots.className = 'tsv-day-dots';
      dayTasks.slice(0, 6).forEach(function (t) {
        var dot = document.createElement('span');
        dot.className = 'tsv-dot';
        if (t.priority === 'high') dot.classList.add('prio-high');
        if (t.priority === 'critical') dot.classList.add('prio-critical');
        var st = (t.status || '').toLowerCase();
        if (st === 'completed') dot.classList.add('st-done');
        if (st === 'declined') dot.classList.add('st-declined');
        dots.appendChild(dot);
      });
      cell.appendChild(dots);
      cell.addEventListener('click', function (ev) {
        var dy = ev.currentTarget.getAttribute('data-day');
        openDayList(dy);
      });
      grid.appendChild(cell);
    }
  }

  function openDayList(dayYmd) {
    var list = tasksForDay(dayYmd);
    var el = document.getElementById('tsvList');
    if (!list.length) {
      el.innerHTML = '<div class="tsv-empty">No tasks on ' + dayYmd + '</div>';
      return;
    }
    el.innerHTML = '<div style="font-weight:600;margin-bottom:8px;">' + dayYmd + '</div>';
    list.forEach(function (t) {
      var c = document.createElement('div');
      c.className = 'tsv-card';
      c.innerHTML =
        '<div class="tsv-card-title">' + escapeHtml(t.title || 'Task') + '</div>' +
        '<div class="tsv-card-meta">' + escapeHtml((t.assigned_to || []).join(', ')) + ' · ' + escapeHtml(t.status || '') + '</div>';
      c.addEventListener('click', function () { openModal(t.id); });
      el.appendChild(c);
    });
  }

  function escapeHtml(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function findTask(id) {
    var sid = String(id);
    for (var i = 0; i < tasks.length; i++) {
      if (String(tasks[i].id) === sid) return tasks[i];
    }
    return null;
  }

  function openModal(taskId) {
    selectedTaskId = taskId;
    var t = findTask(taskId);
    if (!t) return;
    document.getElementById('tsvModalTitle').textContent = t.title || 'Task';
    document.getElementById('tsvDdAssign').textContent = (t.assigned_to || []).join(', ') || '—';
    document.getElementById('tsvDdStatus').textContent = (t.status || '—').replace(/_/g, ' ');
    document.getElementById('tsvDdPrio').textContent = t.priority || '—';
    document.getElementById('tsvDdDeadline').textContent = t.deadline ? String(t.deadline).slice(0, 16).replace('T', ' ') : '—';
    document.getElementById('tsvDdDesc').textContent = t.description || '—';

    var sel = document.getElementById('tsvReassign');
    sel.innerHTML = '';
    operatives.forEach(function (op) {
      var o = document.createElement('option');
      o.value = op.name;
      o.textContent = op.name + (op.email ? ' (' + op.email + ')' : '');
      if ((t.assigned_to || [])[0] === op.name) o.selected = true;
      sel.appendChild(o);
    });

    document.getElementById('tsvPhotos').innerHTML = '<span style="color:var(--muted)">Loading…</span>';
    fetchJson('/api/planning/supervisor/plan-tasks/' + encodeURIComponent(taskId) + '/confirmation-photos', { method: 'GET' })
      .then(function (out) {
        var wrap = document.getElementById('tsvPhotos');
        wrap.innerHTML = '';
        if (!out.ok || !out.json.success) {
          wrap.textContent = '—';
          return;
        }
        (out.json.photos || []).forEach(function (p) {
          var img = document.createElement('img');
          img.src = p.file_url;
          img.alt = '';
          wrap.appendChild(img);
        });
        if (!wrap.children.length) wrap.innerHTML = '<span style="color:var(--muted)">No photos yet.</span>';
      });

    document.getElementById('tsvModalBg').classList.add('open');
  }

  function closeModal() {
    document.getElementById('tsvModalBg').classList.remove('open');
    selectedTaskId = null;
  }

  function patchTask(body) {
    if (!selectedTaskId) return Promise.reject();
    return fetchJson('/api/planning/supervisor/plan-tasks/' + encodeURIComponent(selectedTaskId), {
      method: 'PATCH',
      body: JSON.stringify(body)
    }).then(function (out) {
      if (!out.ok || !out.json.success) throw new Error((out.json && out.json.message) || 'Update failed');
      showToast('Saved');
      return loadAll();
    }).then(function () {
      if (selectedTaskId) openModal(selectedTaskId);
    });
  }

  document.querySelector('.tsv-actions').addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-status]');
    if (!btn) return;
    var st = btn.getAttribute('data-status');
    patchTask({ status: st }).catch(function (err) { showToast(err.message || 'Error'); });
  });

  document.getElementById('tsvBtnReassign').addEventListener('click', function () {
    var name = document.getElementById('tsvReassign').value;
    if (!name) return;
    patchTask({ assigned_to: [name] }).catch(function (err) { showToast(err.message || 'Error'); });
  });

  document.getElementById('tsvBtnPhoto').addEventListener('click', function () {
    document.getElementById('tsvPhotoInput').click();
  });

  document.getElementById('tsvPhotoInput').addEventListener('change', function () {
    var input = this;
    var f = input.files && input.files[0];
    if (!f || !selectedTaskId) return;
    var fd = new FormData();
    fd.append('file', f);
    fd.append('source', 'planning');
    var tok = localStorage.getItem(TOKEN_KEY) || sessionStorage.getItem(TOKEN_KEY);
    fetch('/api/planning/supervisor/plan-tasks/' + encodeURIComponent(selectedTaskId) + '/photos', {
      method: 'POST',
      headers: tok ? { 'X-Operative-Token': tok } : {},
      body: fd
    })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, json: j }; }); })
      .then(function (out) {
        if (!out.ok || !out.json.success) throw new Error((out.json && out.json.message) || 'Upload failed');
        showToast('Photo uploaded');
        input.value = '';
        openModal(selectedTaskId);
      })
      .catch(function (err) { showToast(err.message || 'Error'); });
  });

  document.getElementById('tsvModalClose').addEventListener('click', closeModal);
  document.getElementById('tsvModalBg').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });

  document.getElementById('tsvPrev').addEventListener('click', function () {
    viewDate.setMonth(viewDate.getMonth() - 1);
    renderCalendar();
  });
  document.getElementById('tsvNext').addEventListener('click', function () {
    viewDate.setMonth(viewDate.getMonth() + 1);
    renderCalendar();
  });

  function render() {
    renderCalendar();
    var today = ymd(new Date());
    openDayList(today);
  }

  loadAll();
})();
  </script>
</body>
</html>
