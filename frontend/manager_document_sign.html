<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="/favicon_io/favicon.ico" sizes="any">
  <title>In-person signing – Proconix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/operative_document_sign.css" rel="stylesheet">
</head>
<body class="ods-module">
  <header class="ods-header">
    <a href="digital_signature.html"><i class="bi bi-arrow-left"></i> Documents</a>
    <h1 class="ods-title" id="odsTitle">Document</h1>
    <span class="ods-muted" id="odsMeta"></span>
  </header>

  <div id="odsError" class="ods-error d-none" role="alert"></div>
  <div id="odsSuccess" class="ods-success d-none" role="status"></div>

  <div id="odsPages" class="ods-pages"></div>

  <div class="ods-panel" id="odsPanel">
    <h2><i class="bi bi-pen"></i> In-person signature</h2>
    <p class="ods-muted" id="odsHint">Client can sign directly on this tablet. Fill signer name and complete remaining signature fields.</p>
    <label class="ods-muted">Signer name</label>
    <input type="text" id="odsSignerName" class="ods-input" placeholder="Client full name">
    <label class="ods-muted"><input type="checkbox" id="odsConfirmRead"> I confirm the signer has read this document</label>
    <div id="odsFieldsMount"></div>
    <button type="button" class="ods-btn ods-btn-primary" id="odsBtnSubmit"><i class="bi bi-check2-circle"></i> Save signatures</button>
    <button type="button" class="ods-btn ods-btn-secondary d-none" id="odsBtnAddMore"><i class="bi bi-plus-circle"></i> Add one more signature on this document</button>
    <button type="button" class="ods-btn ods-btn-secondary d-none" id="odsBtnViewDash">Back to documents</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="js/manager_document_sign.js"></script>
</body>
</html>
