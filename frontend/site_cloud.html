<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon_io/favicon.ico" sizes="any">
  <title>Site Cloud – Proconix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/site_cloud.css" rel="stylesheet">
</head>
<body class="sc-module">
  <div class="sc-wrap">
    <header class="sc-topbar">
      <div>
        <a class="sc-back" href="digital_signature.html"><i class="bi bi-arrow-left"></i> Back to Documents &amp; Signatures</a>
        <h1><i class="bi bi-cloud-arrow-up"></i> Site Cloud</h1>
        <p class="sc-subtitle">Multi-tenant file space. Files are private to your company.</p>
      </div>
      <div class="sc-actions">
        <input type="file" id="scFileInput" hidden>
        <button type="button" class="sc-btn sc-btn-primary" id="scUploadBtn">
          <i class="bi bi-upload"></i> Upload file
        </button>
      </div>
    </header>

    <div id="scError" class="sc-error sc-hidden" role="alert"></div>

    <section class="sc-toolbar">
      <div class="sc-search-wrap">
        <i class="bi bi-search"></i>
        <input type="search" id="scSearch" class="sc-input" placeholder="Search by file name...">
      </div>
      <span class="sc-count" id="scCount">0 files</span>
    </section>

    <section class="sc-table-wrap">
      <div class="sc-table-head">
        <span>File</span>
        <span>Uploaded</span>
        <span>Size</span>
        <span>Actions</span>
      </div>
      <div id="scList" class="sc-table-body"></div>
    </section>
  </div>

  <script src="js/site_cloud.js"></script>
</body>
</html>
